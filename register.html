<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="card">

    <div class="icon">⚡</div>

    <h2>إنشاء حسابك</h2>
    <p class="subtitle">انضم إلى مجتمع الرياضة النسائية</p>

    <form>

      <label>الاسم الكامل</label>
      <input type="text" placeholder="أدخل اسمك الكامل">

      <label>البريد الإلكتروني</label>
      <input type="email" placeholder="أدخل بريدك الإلكتروني">

      <label>كلمة المرور</label>
      <input type="password" placeholder="أدخل كلمة المرور">

      <label>تأكيد كلمة المرور</label>
      <input type="password" placeholder="أعد إدخال كلمة المرور">

      <button>إنشاء حساب</button>

    </form>

    <p class="login">
      لديك حساب بالفعل؟ <span>تسجيل الدخول</span>
    </p>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
