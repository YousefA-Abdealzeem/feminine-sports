<div class="page">
  <div class="card">

    <div class="icon">⚡</div>

    <h2>إنشاء حسابك</h2>
    <p class="subtitle">انضم إلى مجتمع الرياضة النسائية</p>

    <form>

      <label>الاسم الكامل</label>
      <input type="text" placeholder="أدخل اسمك الكامل">

      <label>البريد الإلكتروني</label>
      <input type="email" placeholder="أدخل بريدك الإلكتروني">

      <label>كلمة المرور</label>
      <input type="password" placeholder="أدخل كلمة المرور">

      <label>تأكيد كلمة المرور</label>
      <input type="password" placeholder="أعد إدخال كلمة المرور">

      <button type="submit">إنشاء حساب</button>

    </form>

   <div class="auth-container">
     <div class="login">هل لديك حساب؟</div>
     <div class="btn-login" (click)="goToLogin()">تسجيل الدخول</div>
</div>

  </div>
</div>
