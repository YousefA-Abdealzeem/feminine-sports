<div class="video-loader">

  <video
    #videoPlayer
    muted
    playsinline
    loop
    preload="auto"
   >

    <source src="/assets/images/loadvid.mp4" type="video/mp4">
    <source src="/assets/images/loadvid.webm" type="video/webm">

  </video>

  <div class="overlay"></div>

  <button class="continue-btn" (click)="goLogin()">
    Continue to Login
  </button>

</div>
