<div class="video-loader">

  <video
    #videoPlayer
    muted
    playsinline
    loop
    preload="auto">

    <source
      src="/assets/images/loadvid.MP4"
      type="video/mp4">

  <div class="overlay"></div>

  <button class="continue-btn" (click)="goLogin()">
    Continue to Login
  </button>

</div>
