<div class="container mt-5 mb-5" *ngIf="post">
    <div class="back-home pb-4 cursor-pointer">
            <i class="fa-solid fa-right-long"></i>
            <a routerLink="/hero" class="btn-back text-decoration-none pe-2 text-black">الي الرئيسيه</a>
    </div>
  <div class="card shadow h-100">

    <img [src]="post.img" class="card-img-top">

    <div class="card-body">

      <span class="label-post">{{ post.category }}</span>

      <p class="text-muted small mt-2">
        <i class="fa-regular fa-calendar"></i>
        {{ post.date }}
      </p>

      <h2 class="title-post mt-2 fs-2">{{ post.title }}</h2>

      <p class="mt-3 text-muted lh-lg">
        {{ post.desc }}
      </p>

      <!-- Like -->
      <div class="d-flex align-items-center gap-4 mt-4">

        <div class="d-flex align-items-center gap-2 like-btn" (click)="likePost()">

          <i class="fa-heart"
             [ngClass]="post.liked ? 'fa-solid text-danger' : 'fa-regular'">
          </i>

          <span>{{ post.likeCount }}</span>

        </div>

        <div class="d-flex align-items-center gap-2 text-muted">
          <i class="fa-regular fa-comment"></i>
          <span>{{ post.comments.length }}</span>
        </div>

      </div>

      <hr>

      <!-- Comment -->
      <textarea class="form-control mb-3"
                [(ngModel)]="newComment"
                placeholder="اكتب تعليق...">
      </textarea>

      <button class="btn" (click)="addComment()">Add Comment</button>

      <!-- Comments -->
      <div class="mt-4" *ngIf="post.comments.length > 0">

        <div class="comment-box p-3 mb-3" *ngFor="let c of post.comments">

          <div class="d-flex gap-3">

            <img [src]="c.img" class="rounded-circle comment-user-img">

            <div>
              <h6>{{ c.user }}</h6>
              <small>{{ c.date }}</small>
              <p>{{ c.text }}</p>
            </div>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>
